services:
  api:
    image: ghcr.io/lecturelog/lecturelog-core:${LECTURELOG_CORE_IMAGE_TAG:-dev}
    container_name: lecturelog-core-api
    hostname: lecturelog-core-api
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://lecturelog:${CORE_POSTGRES_PASSWORD:-lecturelog}@lecturelog-core-db:5432/lecturelog
      S3_INTERNAL_ENDPOINT: http://lecturelog-core-minio:9000
      S3_BUCKET: ${S3_BUCKET:-lectures}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-lecturelog}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-lecturelog-minio-secret}
    ports:
      - 127.0.0.1:${CORE_HTTP_PORT:-8000}:8000
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health', timeout=3).read()",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - lecturelog-core-internal
      - lecturelog-shared

  db:
    image: postgres:16-alpine
    container_name: lecturelog-core-db
    hostname: lecturelog-core-db
    environment:
      POSTGRES_USER: lecturelog
      POSTGRES_PASSWORD: ${CORE_POSTGRES_PASSWORD:-lecturelog}
      POSTGRES_DB: lecturelog
    volumes:
      - lecturelog-core-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lecturelog -d lecturelog"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    networks:
      - lecturelog-core-internal

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: lecturelog-core-minio
    hostname: lecturelog-core-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-lecturelog}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-lecturelog-minio-secret}
      MINIO_API_STALE_UPLOADS_EXPIRY: 24h
      MINIO_API_STALE_UPLOADS_CLEANUP_INTERVAL: 6h
    volumes:
      - lecturelog-core-minio-data:/data
    ports:
      - 127.0.0.1:${CORE_MINIO_PORT:-9000}:9000
      - 127.0.0.1:${CORE_MINIO_CONSOLE_PORT:-9001}:9001
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    networks:
      - lecturelog-core-internal
      - lecturelog-shared

  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    container_name: lecturelog-core-minio-init
    env_file:
      - .env
    depends_on:
      minio:
        condition: service_healthy
    volumes:
      - ./minio-init.sh:/minio-init.sh:ro
    entrypoint: ["/bin/sh", "/minio-init.sh"]
    networks:
      - lecturelog-core-internal

networks:
  lecturelog-core-internal:
    name: lecturelog-core-internal
  lecturelog-shared:
    name: lecturelog-shared
    external: true

volumes:
  lecturelog-core-postgres-data:
    name: lecturelog-core-postgres-data
  lecturelog-core-minio-data:
    name: lecturelog-core-minio-data
