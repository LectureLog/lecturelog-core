services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: lecturelog
      POSTGRES_PASSWORD: lecturelog
      POSTGRES_DB: lecturelog
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lecturelog"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 10
    # Наружу MinIO в автономном режиме не выставляем: движок ходит по internal
    # endpoint http://minio:9000 внутри docker-сети. Раскомментируй для отладки/консоли.
    # ports:
    #   - "9000:9000"
    #   - "9001:9001"

  # Создание бакета lectures и применение правил жизненного цикла (ILM) при старте.
  # Скрипт идемпотентен (mc mb --ignore-existing + mc ilm import целиком
  # перезаписывает набор правил). После инита контейнер завершается — это инит-шаг,
  # а не постоянный сервис.
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    volumes:
      - ./docker/minio-init.sh:/minio-init.sh:ro
    entrypoint: ["/bin/sh", "/minio-init.sh"]

  api:
    build: .
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://lecturelog:lecturelog@db:5432/lecturelog
      S3_INTERNAL_ENDPOINT: http://minio:9000
      S3_BUCKET: lectures
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      # S3_PUBLIC_ENDPOINT не задан -> presigned выключен (автономный режим):
      # /uploads и /result-url отдают 409, стрим GET /result работает.
    ports:
      - "8000:8000"

volumes:
  pgdata:
  miniodata:
